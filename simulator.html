<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最少人数討伐シミュレーター | ポケGO エキスパートツールズ</title>
    <style>
        :root {
            --pogo-bg-gradient: linear-gradient(180deg, #101c2a 0%, #1a324d 100%);
            --pogo-card-bg: rgba(255, 255, 255, 0.95);
            --pogo-blue: #00d2ff;
            --pogo-blue-dark: #0072ff;
            --text-main: #111827;
            --text-sub: #4b5563;
            --border-color: #e5e7eb;
            
            --color-easy: #059669;
            --color-normal: #d97706;
            --color-hard: #dc2626;
            --color-expert: #2563eb;
            --color-impossible: #4b5563;
        }

        body { margin: 0; padding: 0; background: #f4f6f9; }
        .pogo-container-with-ads { width: 100%; max-width: 600px; margin: 0 auto; padding: 8px; box-sizing: border-box; }
        .pogo-outer-bg { background: var(--pogo-bg-gradient); border-radius: 24px; padding: 12px; box-sizing: border-box; width: 100%; }
        .pogo-simulator-wrapper { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--pogo-card-bg); color: var(--text-main); padding: 20px 16px; border-radius: 18px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); box-sizing: border-box; margin-bottom: 12px; border: 2px solid rgba(255, 255, 255, 0.2); width: 100%; }
        .pogo-simulator-wrapper * { box-sizing: border-box; margin: 0; padding: 0; }
        .pogo-simulator-wrapper h2 { font-size: 1.2rem; text-align: center; margin-bottom: 6px; font-weight: 800; letter-spacing: 0.03em; color: #0f172a; }
        .pogo-status-badge { text-align: center; font-size: 0.75rem; color: var(--text-sub); margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 600; line-height: 1.4; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--color-hard); box-shadow: 0 0 8px var(--color-hard); flex-shrink: 0; }
        .status-dot.online { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .pogo-form-group { margin-bottom: 14px; width: 100%; }
        .pogo-form-group label.group-title { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; color: #1e293b; }
        .pogo-input-text { width: 100%; padding: 12px; font-size: 0.9rem; font-weight: 600; border: 2px solid var(--border-color); border-radius: 10px; margin-bottom: 6px; background-color: #f8fafc; color: var(--text-main); }
        .pogo-select { width: 100%; padding: 12px; font-size: 0.9rem; font-weight: 600; border: 2px solid var(--border-color); border-radius: 10px; background-color: #f8fafc; color: var(--text-main); cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234b5563' stroke-width='2.5'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 14px center; background-size: 14px; }
        .pogo-grid-2 { display: flex; gap: 10px; width: 100%; }
        .pogo-grid-2 > div { flex: 1; min-width: 0; }
        .pogo-checkbox-label { display: flex; align-items: center; justify-content: center; padding: 8px; background-color: #f8fafc; border: 2px solid var(--border-color); border-radius: 10px; cursor: pointer; font-size: 0.8rem; font-weight: 700; height: 48px; text-align: center; transition: all 0.2s; }
        .pogo-checkbox-label input[type="checkbox"] { width: 16px; height: 16px; margin-right: 6px; flex-shrink: 0; }
        .pogo-checkbox-label:has(input:checked) { background-color: #e0f2fe; border-color: var(--pogo-blue-dark); color: var(--pogo-blue-dark); }
        .pogo-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--pogo-blue) 0%, var(--pogo-blue-dark) 100%); color: #ffffff; border: none; border-radius: 24px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 6px; box-shadow: 0 4px 12px rgba(0, 114, 255, 0.2); transition: all 0.2s; }
        .pogo-result-card { margin-top: 16px; padding: 14px; background-color: #ffffff; border-radius: 12px; border: 2px solid #e2e8f0; display: none; width: 100%; }
        .pogo-result-title { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); text-align: center; margin-bottom: 2px; }
        .pogo-result-number { font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 4px; color: #0f172a; }
        .pogo-result-number span { font-size: 1.1rem; color: var(--text-sub); margin-left: 2px; }
        .pogo-result-density { font-size: 0.75rem; font-weight: bold; color: #ef4444; text-align: center; margin-bottom: 6px; }
        .pogo-data-basis { font-size: 0.65rem; font-weight: 600; color: var(--text-sub); text-align: center; margin-bottom: 10px; }
        .pogo-result-message { padding: 12px; border-radius: 10px; font-size: 0.85rem; line-height: 1.5; font-weight: 700; }
        
        .bg-easy { background-color: #ecfdf5; color: var(--color-easy); border-left: 4px solid var(--color-easy); }
        .bg-normal { background-color: #fffbeb; color: var(--color-normal); border-left: 4px solid var(--color-normal); }
        .bg-hard { background-color: #fef2f2; color: var(--color-hard); border-left: 4px solid var(--color-hard); }
        .bg-expert { background-color: #eff6ff; color: var(--color-expert); border-left: 4px solid var(--color-expert); }
        .bg-impossible { background-color: #f9fafb; color: var(--color-impossible); border-left: 4px solid var(--color-impossible); }
        
        .pogo-ad-space { margin: 10px auto; text-align: center; background-color: rgba(255, 255, 255, 0.05); border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 14px; padding: 10px; min-height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .pogo-ad-space::before { content: "スポンサーリンク / 広告"; display: block; font-size: 0.6rem; color: rgba(255, 255, 255, 0.4); margin-bottom: 6px; width: 100%; font-weight: 600; }
        .nav-back-box { max-width: 600px; margin: 1rem auto; padding: 0 8px; box-sizing: border-box; }
        .nav-back-box a { text-decoration: none; color: #2a75d3; font-weight: bold; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="pogo-container-with-ads">
    <div class="pogo-outer-bg">
        <div class="pogo-ad-space"></div>

        <div class="pogo-simulator-wrapper">
            <h2>最少人数討伐シミュレーター</h2>
            <div class="pogo-status-badge">
                <div id="statusDot" class="status-dot"></div>
                <span id="statusText">最新ボスデータロード中...</span>
            </div>
            
            <div class="pogo-form-group">
                <label class="group-title" for="bossSearch">レイドボス選択</label>
                <input type="text" id="bossSearch" class="pogo-input-text" placeholder="例: ミュウツー、カイオーガ (絞り込み)" oninput="filterBosses()">
                <select id="bossSelect" class="pogo-select">
                    <option value="" disabled selected>データを読み込み中...</option>
                </select>
            </div>

            <div class="pogo-form-group">
                <label class="group-title" for="trainerLevel">自分のトレーナーレベル（TL目安）</label>
                <select id="trainerLevel" class="pogo-select">
                    <option value="30">TL 30 〜 39</option>
                    <option value="40">TL 40 〜 49</option>
                    <option value="50">TL 50 〜 59</option>
                    <option value="60">TL 60 〜 69</option>
                    <option value="80" selected>TL 70 〜 80</option>
                </select>
            </div>

            <div class="pogo-grid-2 pogo-form-group">
                <div>
                    <label class="pogo-checkbox-label">
                        <input type="checkbox" id="weatherBoost">
                        ☀️ 天候ブースト
                    </label>
                </div>
                <div>
                    <select id="friendBonus" class="pogo-select" style="height: 48px;">
                        <option value="1.0">フレンド補正なし</option>
                        <option value="1.03">友達 (1.03倍)</option>
                        <option value="1.05">仲良し (1.05倍)</option>
                        <option value="1.07">親友 (1.07倍)</option>
                        <option value="1.10" selected>大親友 (1.10倍)</option>
                        <option value="1.15">大親友 + チームパワー</option>
                    </select>
                </div>
            </div>

            <button type="button" class="pogo-btn" onclick="calculateRaid()">必要最少人数を計算</button>

            <div id="resultCard" class="pogo-result-card">
                <div class="pogo-result-title">必要最少人数</div>
                <div class="pogo-result-number" id="resultNumber">-.--<span>人</span></div>
                <div class="pogo-result-density" id="resultDensity"></div>
                <div class="pogo-data-basis" id="dataBasis">算出根拠: --</div>
                <div class="pogo-result-message" id="resultMessage"></div>
            </div>
        </div>

        <div class="pogo-ad-space"></div>
    </div>
</div>

<div class="nav-back-box">
    <a href="index.html">&larr; トップページに戻る</a>
</div>

<script>
let allBossList = [];
let dynamicPokemonData = {};

// 予期せぬエラーで画面が完全に沈黙するのを防ぐためのフォールバック(予備)データ
const fallbackBosses = [
    { "id": "MEWTWO", "name": "ミュウツー", "defense": 182, "tier": "T5" },
    { "id": "KYOGRE", "name": "カイオーガ", "defense": 228, "tier": "T5" },
    { "id": "GROUDON", "name": "グラードン", "defense": 228, "tier": "T5" },
    { "id": "RAYQUAZA", "name": "レックウザ", "defense": 170, "tier": "T5" },
    { "id": "PRIMAL_KYOGRE", "name": "ゲンシカイオーガ", "defense": 257, "tier": "SUPER_MEGA" },
    { "id": "PRIMAL_GROUDON", "name": "ゲンシグラードン", "defense": 257, "tier": "SUPER_MEGA" },
    { "id": "MEGA_RAYQUAZA", "name": "メガレックウザ", "defense": 206, "tier": "SUPER_MEGA" }
];

async function fetchLatestData() {
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    // ステップ1: 独自JSON (event-data.json) の読み込み
    try {
        const dbResponse = await fetch('event-data.json');
        if (!dbResponse.ok) throw new Error(`event-data.jsonが見つかりません (Status: ${dbResponse.status})`);
        
        const dbData = await dbResponse.json();
        if (dbData && dbData.raidBosses) {
            allBossList = dbData.raidBosses;
        } else {
            throw new Error("JSON内に raidBosses データが見つかりません");
        }
        statusText.innerText = 'ローカル独自DB読込完了';
    } catch (error) {
        console.error("Local DB Load Error:", error);
        // エラー時は予備データを流し込んで強制起動
        allBossList = [...fallbackBosses];
        statusDot.style.backgroundColor = '#dc2626'; // 赤ドット
        statusText.innerHTML = `<span style="color:#dc2626;">ローカルJSON読込失敗: ${error.message} (予備モードで起動中)</span>`;
    }

    // マップにデータを初期展開
    allBossList.forEach(poke => {
        dynamicPokemonData[poke.id] = { defense: poke.defense, tier: poke.tier || "T5" };
    });

    // ステップ2: クラウド (PvPokeマスター) からの最新防御実数値の上書きマージ
    try {
        const response = await fetch('https://raw.githubusercontent.com/pvpoke/pvpoke/master/src/data/gamemaster/pokemon.json');
        if (response.ok) {
            const data = await response.json();
            data.forEach(poke => {
                const upperId = poke.id.toUpperCase();
                let matchedId = dynamicPokemonData[upperId] ? upperId : (dynamicPokemonData[upperId + "_NORMAL"] ? upperId + "_NORMAL" : null);

                if (matchedId && poke.stats && poke.stats.defense) {
                    dynamicPokemonData[matchedId].defense = parseInt(poke.stats.defense);
                    const listIdx = allBossList.findIndex(b => b.id === matchedId);
                    if (listIdx !== -1) allBossList[listIdx].defense = parseInt(poke.stats.defense);
                }
            });
            statusDot.classList.add('online');
            if (!statusText.innerHTML.includes('失敗')) {
                statusText.innerText = '全ボスデータ: 独自DB ＆ クラウド同期完了';
            }
        }
    } catch (cloudError) {
        console.error("Cloud Sync Error:", cloudError);
    }
    
    // 最終的にセレクトボックスを確実に描画
    renderBossOptions(allBossList);
}

function renderBossOptions(list) {
    const bossSelect = document.getElementById('bossSelect');
    bossSelect.innerHTML = '';
    
    if (!list || list.length === 0) {
        const option = document.createElement('option');
        option.textContent = '該当ボス不在';
        bossSelect.appendChild(option);
        return;
    }

    list.forEach(poke => {
        const option = document.createElement('option');
        option.value = poke.id;
        option.textContent = `${poke.name} [防御:${poke.defense}]`;
        bossSelect.appendChild(option);
    });
}

function filterBosses() {
    const keyword = document.getElementById('bossSearch').value.toLowerCase();
    const filtered = allBossList.filter(poke => 
        poke.name.toLowerCase().includes(keyword) || 
        poke.id.toLowerCase().includes(keyword)
    );
    renderBossOptions(filtered);
}

function calculateRaid() {
    const bossSelect = document.getElementById('bossSelect');
    if (!bossSelect.value) return;

    const bossKey = bossSelect.value;
    const targetBoss = allBossList.find(b => b.id === bossKey);
    const tier = targetBoss ? targetBoss.tier : "T5";

    let bossHp = 15000;
    let tierLabel = "★5 伝説レイド";
    let cpMultiplier = 0.79;

    if (tier === "SUPER_MEGA") {
        bossHp = 22550;
        tierLabel = "スーパーメガ / ゲンシレイド";
        cpMultiplier = 0.79;
    } else if (tier === "MEGA") {
        bossHp = 9000;
        tierLabel = "メガレイド";
        cpMultiplier = 0.79;
    }

    let baseBossDef = dynamicPokemonData[bossKey] ? dynamicPokemonData[bossKey].defense : 200;
    let bossDef = Math.floor(baseBossDef * cpMultiplier);

    const tlValue = document.getElementById('trainerLevel').value;
    const weatherBoost = document.getElementById('weatherBoost').checked;
    const friendBonus = parseFloat(document.getElementById('friendBonus').value);

    const timeLimit = 300; 
    const baseDps = (6200 / (bossDef || 200)) * 0.65; 

    let tlModifier = 1.0;
    if (tlValue === "30") tlModifier = 0.75;  
    if (tlValue === "40") tlModifier = 1.00;  
    if (tlValue === "50") tlModifier = 1.18;  
    if (tlValue === "60") tlModifier = 1.22;  
    if (tlValue === "80") tlModifier = 1.25;  

    let dps = baseDps * tlModifier;
    if (weatherBoost) dps = dps * 1.20;
    dps = dps * friendBonus;

    const totalDamagePerPerson = dps * timeLimit;
    const requiredPeople = bossHp / totalDamagePerPerson;

    const resultCard = document.getElementById('resultCard');
    const resultNumber = document.getElementById('resultNumber');
    const resultDensity = document.getElementById('resultDensity');
    const dataBasis = document.getElementById('dataBasis');
    const resultMessage = document.getElementById('resultMessage');

    resultMessage.className = "pogo-result-message";

    if (requiredPeople > 20.0) {
        resultNumber.innerHTML = `20<span>人以上</span>`;
        resultDensity.innerText = "討伐難易度: ⚠️ IMPOSSIBLE";
        resultMessage.innerText = "【討伐不可】レイド最大上限の20人を集めても時間切れのリスク大。天候ブーストや大親友の補正を最大限に噛み合わせる必要があります。";
        resultMessage.classList.add("bg-impossible");
    } else {
        resultNumber.innerHTML = `${requiredPeople.toFixed(2)}<span>人</span>`;
        
        if (requiredPeople < 1.0) {
            resultDensity.innerText = "討伐難易度: 🟢 SOLO (1人)";
            resultMessage.innerText = "【ソロ討伐可能】最適化されたパーティであれば、1人単独でのクリアが十分に狙えます。";
            resultMessage.classList.add("bg-easy");
        } else if (requiredPeople >= 1.0 && requiredPeople < 2.0) {
            resultDensity.innerText = "討伐難易度: 🟡 DUO (2人)";
            resultMessage.innerText = "【2人討伐可能】フル強化パーティを持つガチ勢2人、あるいは大親友かつ天候ブーストを味方に付ければデュオ突破可能です。";
            resultMessage.classList.add("bg-normal");
        } else if (requiredPeople >= 2.0 && requiredPeople < 3.0) {
            resultDensity.innerText = "討伐難易度: 🔴 TRIO (3人)";
            resultMessage.innerText = "【3人討伐安定】適切な弱点アタッカーを揃えたプレイヤーが3人揃えば、安定して時間内クリア可能です。";
            resultMessage.classList.add("bg-hard");
        } else {
            resultDensity.innerText = "討伐難易度: 🔵 EXPERT (4人以上)";
            resultMessage.innerText = "【集団戦必須】4人以上の大所帯が必要です。周囲のトレーナーとロビーを合わせるか、リモートレイドを活用してください。";
            resultMessage.classList.add("bg-expert");
        }
    }

    dataBasis.innerText = `算出根拠: ${tierLabel} (実効防御力: ${bossDef} / レイドHP: ${bossHp})`;
    resultCard.style.display = 'block';
}

window.addEventListener('DOMContentLoaded', fetchLatestData);
</script>
</body>
</html>
