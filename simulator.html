<!DOCTYPE html>
<html lang="ja">
<head>

    <title>最少人数討伐シミュレーター</title>
    <style>

            --pogo-bg-gradient: linear-gradient(180deg, #101c2a 0%, #1a324d 100%);
            --pogo-card-bg: rgba(255, 255, 255, 0.95);
            --pogo-blue: #00d2ff;
            --pogo-blue-dark: #0072ff;
            --text-main: #111827;
            --text-sub: #4b5563;

            --color-hard: #dc2626;

            color: var(--text-main);
            padding: 20px 16px;
            border-radius: 18px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
            margin-bottom: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            width: 100%;
        }

        .pogo-simulator-wrapper * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .pogo-simulator-wrapper h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 6px;
            font-weight: 800;
            letter-spacing: 0.03em;
            color: #0f172a;
        }

        .pogo-status-badge {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--color-hard);
            box-shadow: 0 0 8px var(--color-hard);
        }
        .status-dot.online { 
            background-color: #10b981; 
            box-shadow: 0 0 8px #10b981;
        }

        .pogo-form-group {
            margin-bottom: 14px;
            width: 100%;
        }

        .pogo-form-group label.group-title {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #1e293b;
        }

        .pogo-input-text {
            width: 100%;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 6px;
            background-color: #f8fafc;
            color: var(--text-main);
        }

        .pogo-select {
            width: 100%;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: #f8fafc;
            color: var(--text-main);
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234b5563' stroke-width='2.5'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 14px;
        }

        .pogo-grid-2 {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .pogo-grid-2 > div {
            flex: 1;
            min-width: 0;
        }

        .pogo-checkbox-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            background-color: #f8fafc;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            height: 48px;
            text-align: center;
            transition: all 0.2s;
        }

        .pogo-checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 6px;
            flex-shrink: 0;
        }

            background-color: #e0f2fe;
            border-color: var(--pogo-blue-dark);
            color: var(--pogo-blue-dark);
        }

        .pogo-btn {
            width: 100%;
            padding: 14px;

            border-radius: 24px;

            cursor: pointer;

const specialBossMap = {
    "RAYQUAZA": { hp: 22550, defBonus: 50, label: "メガ伝説レイド" },
    "MEGA_RAYQUAZA": { hp: 22550, defBonus: 50, label: "メガ伝説レイド" },

    "PRIMAL_GROUDON": { hp: 22550, defBonus: 50, label: "メガ伝説レイド" }
};

async function fetchLatestData() {
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    
    allBossList = JSON.parse(JSON.stringify(masterBossList));
    allBossList.forEach(poke => {
        dynamicPokemonData[poke.id] = { defense: poke.defense };
    });

    try {
        const response = await fetch('https://raw.githubusercontent.com/pvpoke/pvpoke/master/src/data/gamemaster/pokemon.json');
        if (!response.ok) throw new Error();
        const data = await response.json();
        
        data.forEach(poke => {
            const upperId = poke.id.toUpperCase();
            let matchedId = null;

            if (dynamicPokemonData[upperId]) {
                matchedId = upperId;
            } else if (dynamicPokemonData[upperId + "_NORMAL"]) {
                matchedId = upperId + "_NORMAL";
            }

            if (matchedId && poke.stats && poke.stats.defense) {
                dynamicPokemonData[matchedId].defense = parseInt(poke.stats.defense);
                const listIdx = allBossList.findIndex(b => b.id === matchedId);
                if (listIdx !== -1) {
                    allBossList[listIdx].defense = parseInt(poke.stats.defense);
                }
            }
        });
        
        renderBossOptions(allBossList);
        statusDot.classList.add('online');
        statusText.innerText = 'ボスデータ: 最新クラウド同期完了';
    } catch (error) {
        console.warn('外部データの同期に失敗したため、内蔵のマスターデータベースで起動します。');
        renderBossOptions(allBossList);
        statusText.innerText = 'ボスデータ: 内蔵マスターモード動作中';
    }
}

function renderBossOptions(list) {
    const bossSelect = document.getElementById('bossSelect');
    bossSelect.innerHTML = '';
    
    if (list.length === 0) {
        const option = document.createElement('option');
        option.textContent = '該当するボスが見つかりません';
        bossSelect.appendChild(option);
        return;
    }

    list.forEach(poke => {
        const option = document.createElement('option');
        option.value = poke.id;
        option.textContent = `${poke.name} (${poke.id})`;
        bossSelect.appendChild(option);
    });
}

function filterBosses() {
    const keyword = document.getElementById('bossSearch').value.toLowerCase();
    const filtered = allBossList.filter(poke => 
        poke.name.toLowerCase().includes(keyword) || 
        poke.id.toLowerCase().includes(keyword)
    );
    renderBossOptions(filtered);
}

function calculateRaid() {
    const bossSelect = document.getElementById('bossSelect');
    if (!bossSelect.value) return;

    const bossKey = bossSelect.value;
    
    let bossHp = 15000;
    let defBonus = 0;
    let tierLabel = "★5 伝説レイド";

    if (specialBossMap[bossKey]) {
        bossHp = specialBossMap[bossKey].hp;
        defBonus = specialBossMap[bossKey].defBonus;
        tierLabel = specialBossMap[bossKey].label;
    } 
    else if (bossKey.includes("MEGA") || bossKey.includes("PRIMAL")) {
        bossHp = 9000;
        defBonus = 30; 
        tierLabel = "メガレイド";
    }

    let baseBossDef = dynamicPokemonData[bossKey] ? dynamicPokemonData[bossKey].defense : 200;
    let bossDef = baseBossDef + defBonus; 

    const tlValue = document.getElementById('trainerLevel').value;
    const weatherBoost = document.getElementById('weatherBoost').checked;
    const friendBonus = parseFloat(document.getElementById('friendBonus').value);

    const timeLimit = 300; 
    const baseDps = (6200 / bossDef) * 0.65; 

    let tlModifier = 1.0;
    if (tlValue === "30") tlModifier = 0.80;
    if (tlValue === "40") tlModifier = 1.00;
    if (tlValue === "50") tlModifier = 1.15;
    if (tlValue === "60") tlModifier = 1.28; 
    if (tlValue === "80") tlModifier = 1.45; 

    let dps = baseDps * tlModifier;
    if (weatherBoost) dps = dps * 1.2;
    dps = dps * friendBonus;

    const totalDamagePerPerson = dps * timeLimit;
    const requiredPeople = bossHp / totalDamagePerPerson;

    const resultCard = document.getElementById('resultCard');
    const resultNumber = document.getElementById('resultNumber');
    const dataBasis = document.getElementById('dataBasis');
    const resultMessage = document.getElementById('resultMessage');

    resultMessage.className = "pogo-result-message";

    if (requiredPeople > 20.0) {
        resultNumber.innerHTML = `20<span>人以上</span>`;
        resultMessage.innerText = "【討伐不可】レイドの最大参加人数（20人）を集めても時間内のクリアが極めて困難です。パーティの相性や育成、天候ブーストを見直してください。";
        resultMessage.classList.add("bg-impossible");
    } else {
        resultNumber.innerHTML = `${requiredPeople.toFixed(2)}<span>人</span>`;
        
        if (requiredPeople < 1.0) {
            resultMessage.innerText = "【難易度：低】ソロ（1人）で討伐可能です！単独突破のロマンに挑戦しましょう！";
            resultMessage.classList.add("bg-easy");
        } else if (requiredPeople >= 1.0 && requiredPeople < 2.0) {
            resultMessage.innerText = "【難易度：中】しっかり対策した同レベルのトレーナーなら2人（デュオ）での討伐が可能です。";
            resultMessage.classList.add("bg-normal");
        } else if (requiredPeople >= 2.0 && requiredPeople < 3.0) {
            resultMessage.innerText = "【難易度：高】適切な対策ポケモンを並べたプレイヤーが3人いれば安定して討伐可能です。";
            resultMessage.classList.add("bg-hard");
        } else {
            resultMessage.innerText = "【難易度：極】4人以上の大所帯が必要です。人の集まる時間帯の野良レイドやリモートレイドパスを活用しましょう。";
            resultMessage.classList.add("bg-expert");
        }
    }

    dataBasis.innerText = `算出根拠: ${tierLabel} (防御力 ${bossDef} / HP ${bossHp})`;
    resultCard.style.display = 'block';
}

window.addEventListener('DOMContentLoaded', fetchLatestData);
</script>
