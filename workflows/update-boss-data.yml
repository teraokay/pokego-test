name: Periodic Pokémon Data Sync JOB

on:
  schedule:
    # 毎日UTC 19:00（日本時間 午前4:00）に自動実行
    - cron: '0 19 * * *'
  workflow_dispatch: # GitHub画面から手動でいつでも実行できるボタンを設置

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの自動書き込み権限を許可

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: '20'

    - name: Run Fetch and Update Script
      run: |
        node -e '
        const fs = require("fs");
        
        async function run() {
          try {
            // 1. 最新のPvPokeデータを公式マスターソースからFetch
            const response = await fetch("https://raw.githubusercontent.com/pvpoke/pvpoke/master/src/data/gamemaster/pokemon.json");
            if (!response.ok) throw new Error("Fetch failed");
            const rawData = await response.json();
            
            // 2. 現在の自前の event-data.json を読み込み
            const localData = JSON.parse(fs.readFileSync("event-data.json", "utf8"));
            
            // 3. 自前のボスリストに登録されているポケモンの防御力を最新データで上書き自動クローニング
            let updatedCount = 0;
            localData.raidBosses = localData.raidBosses.map(boss => {
              const cloudPoke = rawData.find(p => p.id.toUpperCase() === boss.id || p.id.toUpperCase() === boss.id.replace("_NORMAL", ""));
              if (cloudPoke && cloudPoke.stats && cloudPoke.stats.defense) {
                boss.defense = parseInt(cloudPoke.stats.defense);
                updatedCount++;
              }
              return boss;
            });
            
            // 4. event-data.json を上書き保存
            fs.writeFileSync("event-data.json", JSON.stringify(localData, null, 2), "utf8");
            console.log(`Successfully synced ${updatedCount} bosses with latest stats.`);
          } catch (err) {
            console.error("Sync Error:", err);
            process.exit(1);
          }
        }
        run();
        '

    - name: Commit and Push if changes exist
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add event-data.json
        if ! git diff --cached --exit-code; then
          git commit -m "🤖 [JOB] クラウドデータベースから最新のレイドボス防御数値を自動同期"
          git push
        else
          echo "No changes detected. Skip commit."
        fi
