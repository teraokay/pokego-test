<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケGO エキスパートツールズ | トップ</title>
    <style>
        :root { --primary-color: #2a75d3; --bg-color: #f4f6f9; --card-bg: #ffffff; --text-color: #333333; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; line-height: 1.6; }
        header { background-color: var(--primary-color); color: white; text-align: center; padding: 2rem 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 1.8rem; }
        header p { margin: 0.5rem 0 0 0; font-size: 0.9rem; opacity: 0.9; }
        main { max-width: 800px; margin: 1.5rem auto; padding: 0 1rem; }
        .section-title { font-size: 1.3rem; border-left: 5px solid var(--primary-color); padding-left: 0.6rem; margin: 2rem 0 1rem 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card-bg); border-radius: 8px; border: 1px solid #e1e4e8; padding: 1.5rem; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: transform 0.2s, border-color 0.2s; }
        .card:hover { transform: translateY(-2px); border-color: var(--primary-color); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card h3 { margin: 0 0 0.5rem 0; color: var(--primary-color); font-size: 1.2rem; }
        .card p { margin: 0; font-size: 0.9rem; color: #666; flex-grow: 1; }
        .badge { display: inline-block; background-color: #e3f2fd; color: var(--primary-color); font-size: 0.75rem; font-weight: bold; padding: 0.25rem 0.5rem; border-radius: 4px; margin-top: 1rem; align-self: flex-start; }
        .badge.event { background-color: #ffe0b2; color: #e65100; }
        footer { text-align: center; padding: 2rem 1rem; font-size: 0.8rem; color: #888; margin-top: 4rem; border-top: 1px solid #e1e4e8; background: #fff; }
    </style>
</head>
<body>
    <header>
        <h1>ポケGO エキスパートツールズ</h1>
        <p>少人数レイドシミュレーター ＆ 効率化攻略情報</p>
    </header>
    <main>
        <h2 class="section-title">イベント情報</h2>
        <div class="grid">
            <a href="event.html" class="card">
                <h3>開催中・予定のイベント一覧</h3>
                <p>現在開催中のイベントや、直近で開催される公式イベントの要点・ToDoまとめページへ進みます。</p>
                <span class="badge event">イベント情報へ</span>
            </a>
        </div>

        <h2 class="section-title">攻略支援ツール</h2>
        <div class="grid">
            <a href="simulator.html" class="card">
                <h3>最少人数討伐シミュレーター</h3>
                <p>ボスのステータスや技構成から、討伐に必要な最小人数やおすすめ対策ポケモンを精密に計算します。</p>
                <span class="badge">公開中</span>
            </a>
        </div>
    </main>
    <footer><p>&copy; ポケGO エキスパートツールズ</p></footer>
</body>
</html>
