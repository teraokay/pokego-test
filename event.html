<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント一覧 | ポケGO エキスパートツールズ</title>
    <style>
        :root { --primary-color: #2a75d3; --bg-color: #f4f6f9; --card-bg: #ffffff; --text-color: #333333; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; line-height: 1.6; }
        .nav-bar { max-width: 800px; margin: 1rem auto 0 auto; padding: 0 1rem; }
        .nav-bar a { text-decoration: none; color: var(--primary-color); font-weight: bold; font-size: 0.9rem; }
        main { max-width: 800px; margin: 1rem auto 3rem auto; padding: 0 1rem; }
        h1 { font-size: 1.6rem; color: #222; margin-bottom: 1.5rem; }
        .event-list-item { background: var(--card-bg); border-radius: 8px; border: 1px solid #e1e4e8; padding: 1.5rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; }
        .status-badge { display: inline-block; background: #e65100; color: white; font-size: 0.75rem; font-weight: bold; padding: 0.2rem 0.5rem; border-radius: 4px; align-self: flex-start; margin-bottom: 0.5rem; }
        .status-badge.upcoming { background: #2e7d32; }
        .event-item-title { font-size: 1.3rem; margin: 0 0 0.5rem 0; color: #111; }
        .event-item-date { font-size: 0.85rem; color: #666; margin-bottom: 0.8rem; }
        .btn-detail { display: inline-block; background: var(--primary-color); color: white; padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; font-size: 0.85rem; font-weight: bold; align-self: flex-start; margin-top: 0.5rem; }
        .btn-detail:hover { background: #1e5bb3; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="index.html">&larr; トップページに戻る</a></div>
    <main>
        <h1>開催中・予定のイベント一覧</h1>

        <div class="event-list-item">
            <span class="status-badge upcoming">まもなく開催</span>
            <h2 class="event-item-title">Pokémon GO Fest 2026：グローバル</h2>
            <div class="event-item-date">期間: 2026年7月11日(土) 〜 7月12日(日)</div>
            <p style="margin: 0 0 0.8rem 0; font-size: 0.9rem; color: #555;">新幻のポケモン「ゼラオラ」やメガミュウツーX・Yが初降臨する、今年最大のビッグイベント！</p>
            <a href="go-fest-2026.html" class="btn-detail">要点・ToDo詳細を見る &rarr;</a>
        </div>

        </main>
</body>
</html>
